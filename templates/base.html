<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Library Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <div class="d-flex" id="wrapper">
      <div class="bg-dark text-white sidebar">
        <h3 class="p-3">📚 Library</h3>
        <nav class="nav flex-column p-3">
          <a class="nav-link text-white" href="{{ url_for('dashboard') }}">Dashboard</a>
          <a class="nav-link text-white" href="{{ url_for('books') }}">Books</a>
          <a class="nav-link text-white" href="{{ url_for('members') }}">Members</a>
          <a class="nav-link text-white" href="{{ url_for('issue_book') }}">Issue Book</a>
          <a class="nav-link text-white" href="{{ url_for('return_book') }}">Return Book</a>
          <a class="nav-link text-white" href="{{ url_for('reports') }}">Reports</a>
        </nav>
      </div>

      <div class="flex-grow-1 p-4 content-area">
        <div class="container-fluid">
          {% with messages = get_flashed_messages() %}
            {% if messages %}
              {% for message in messages %}
                <div class="alert alert-info">{{ message }}</div>
              {% endfor %}
            {% endif %}
          {% endwith %}
          {% block content %}{% endblock %}
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  </body>
</html>
